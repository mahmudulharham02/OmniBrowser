name: Build Signed APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Release Keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/release.keystore \
            -storepass omnibrowser123 \
            -keypass omnibrowser123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias omnikey \
            -dname "CN=OmniBrowser,O=OmniBrowser,C=US"
          echo "✅ Release keystore generated"

      - name: Generate Debug Keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/debug.keystore \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias androiddebugkey \
            -dname "CN=OmniBrowser Debug,O=OmniBrowser,C=US"
          echo "✅ Debug keystore generated"

      - name: Create local.properties
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          cat local.properties

      - name: Build Release APK (Signed)
        run: |
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH="$(pwd)/keystore/release.keystore" \
            -PSTORE_PASSWORD="omnibrowser123" \
            -PKEY_PASSWORD="omnibrowser123" \
            --stacktrace --info
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --info
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug')

      - name: Verify APK Signature
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "🔍 Verifying APK signature..."
            jarsigner -verify -verbose -certs "$APK_PATH"
            echo "✅ APK signature verified!"
          else
            echo "⚠️ APK not found at $APK_PATH"
          fi
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        continue-on-error: true

      - name: Align APK with zipalign
        run: |
          mkdir -p app/build/outputs/apk/release/optimized
          APK_INPUT="app/build/outputs/apk/release/app-release.apk"
          APK_OUTPUT="app/build/outputs/apk/release/optimized/app-release-optimized.apk"
          
          if [ -f "$APK_INPUT" ]; then
            ${ANDROID_HOME}/build-tools/$(ls -t ${ANDROID_HOME}/build-tools | head -1)/zipalign -v 4 \
              "$APK_INPUT" \
              "$APK_OUTPUT"
            echo "✅ APK aligned and optimized"
          fi
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')
        continue-on-error: true

      - name: Upload APK Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OmniBrowser-APK-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/optimized/app-release-optimized.apk
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Create GitHub Release (on Tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/optimized/app-release-optimized.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
          body: |
            ## OmniBrowser Release ${{ github.ref_name }}
            
            **Build Information:**
            - **Build Number:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Tag:** ${{ github.ref_name }}
            
            **APK Specifications:**
            - Type: Release (Signed & Optimized)
            - Min SDK: 24 | Target SDK: 36
            - Package: com.aistudio.omnibrowser.pwkvdg
            
            **Installation:**
            ```bash
            adb install -r app-release-optimized.apk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Build Report
        if: always()
        run: |
          echo "## 📱 OmniBrowser Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch/Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Outputs:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "app/build/outputs/apk/release/optimized/app-release-optimized.apk" ]; then
            SIZE=$(du -h app/build/outputs/apk/release/optimized/app-release-optimized.apk | cut -f1)
            echo "✅ **Release APK (Optimized)** - $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            SIZE=$(du -h app/build/outputs/apk/release/app-release.apk | cut -f1)
            echo "✅ **Release APK (Signed)** - $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ **Debug APK** - $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ ! -f "app/build/outputs/apk/release/app-release.apk" ] && [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "⚠️ No APKs were built" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to Download:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **Actions** tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Click latest **Build Signed APK** run" >> $GITHUB_STEP_SUMMARY
          echo "3. Download from **Artifacts**" >> $GITHUB_STEP_SUMMARY
