name: Build Signed APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.8
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add gradle* .gitignore
            git commit -m "Add Gradle wrapper files" || true
            git push || true
          else
            echo "Gradle wrapper already exists"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Release Keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/release.keystore \
            -storepass omnibrowser123 \
            -keypass omnibrowser123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias omnikey \
            -dname "CN=OmniBrowser,O=OmniBrowser,C=US"

      - name: List files to debug
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Gradle wrapper ==="
          ls -la gradle/wrapper/ 2>/dev/null || echo "Wrapper directory not found"

      - name: Build Release APK
        run: |
          ./gradlew --version
          ./gradlew assembleRelease \
            -PKEYSTORE_PATH="$(pwd)/keystore/release.keystore" \
            -PSTORE_PASSWORD="omnibrowser123" \
            -PKEY_PASSWORD="omnibrowser123" \
            --stacktrace --info
        if: github.event_name != 'pull_request'

      - name: Build Debug APK (on PR)
        run: ./gradlew assembleDebug --stacktrace --info
        if: github.event_name == 'pull_request'

      - name: Upload APK Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OmniBrowser-APK-${{ github.run_number }}
          path: app/build/outputs/apk/
          retention-days: 30

      - name: Build Report
        if: always()
        run: |
          echo "## 📱 Build Report" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk/ -name "*.apk" -type f -exec sh -c 'echo "✅ $(basename {}): $(du -h {} | cut -f1)"' \; 2>/dev/null || echo "⚠️ No APKs built"
