name: Build Signed APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release or debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle (with wrapper)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper

      - name: Generate Release Keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v \
            -keystore keystore/release.keystore \
            -storepass omnibrowser123 \
            -keypass omnibrowser123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias omnikey \
            -dname "CN=OmniBrowser,O=OmniBrowser,C=US"
          ls -la keystore/

      - name: Build Release APK
        run: |
          ./gradlew --version
          ./gradlew assembleRelease --stacktrace --info
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/release.keystore
          STORE_PASSWORD: omnibrowser123
          KEY_PASSWORD: omnibrowser123

      - name: Build Debug APK (on PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OmniBrowser-APK-${{ github.run_number }}
          path: app/build/outputs/apk/
          retention-days: 30
          if-no-files-found: ignore

      - name: Build Report
        if: always()
        run: |
          echo "## Build Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk/ -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APKs found"
